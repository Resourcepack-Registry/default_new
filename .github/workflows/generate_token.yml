name: 'Generate Token'

on:
  workflow_dispatch: {}

jobs:
  generate-token:
    runs-on: ubuntu-24.04
    steps:
      - name: 'Generate Token'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          
      - name: 'Set Output'
        run: |
          echo "token=${{ steps.app-token.outputs.token }}" >> $GITHUB_OUTPUT

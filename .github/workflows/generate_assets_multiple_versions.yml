name: 'Generate assets for multiple versions'

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions as a JSON array.'
        type: string
        required: true

jobs:
  generate-assets:
    name: 'Run generate_assets.yml'
    runs-on: ubuntu-24.04
    steps:
      - name: 'Generate GitHub App token'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Run assets generation loop'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          versions='${{ inputs.versions }}'
          for version in $(echo "$versions" | jq -r '.[]'); do
            echo "Generating fresh app token..."
            token=$(gh api \
              --method POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              /app/installations/$APP_INSTALLATION_ID/access_tokens \
              --jq '.token')
            
            export GH_TOKEN="$token"
            
            echo "Triggering workflow for version \"$version\""
            gh workflow run generate_assets.yml \
              --repo $REPOSITORY \
              -f version="$version"
            
            sleep 5
            run_id=$(gh run list --workflow="generate_assets.yml" --json databaseId --jq '.[0].databaseId')
            echo "Waiting for run $run_id to complete..."
            gh run watch "$run_id" --compact --exit-status
          done
